<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="STORM mark">
  <defs>
    <linearGradient id="storm-mark-g" x1="14" y1="6" x2="50" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5BD4FF"/>
      <stop offset="0.55" stop-color="#4F8BFF"/>
      <stop offset="1" stop-color="#B58CFF"/>
    </linearGradient>
    <radialGradient id="storm-mark-glow" cx="32" cy="32" r="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4F8BFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#4F8BFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#storm-mark-glow)" stroke="#1E2A44" stroke-width="1"/>

  <!-- Classic ⚡ bolt: top arm, sharp inner notch, long slash to bottom tip -->
  <!-- 7 points form a sharp asymmetric bolt with pointed top-right and bottom-left tips -->

  <!-- Back bolt: faintest, offset up-left for ghost effect -->
  <path d="M 16 6 L 42 6 L 30 24 L 44 24 L 18 56 L 26 36 L 12 36 Z"
        fill="url(#storm-mark-g)" opacity="0.20"/>

  <!-- Mid bolt -->
  <path d="M 19 8 L 45 8 L 33 26 L 47 26 L 21 58 L 29 38 L 15 38 Z"
        fill="url(#storm-mark-g)" opacity="0.50"/>

  <!-- Front bolt: full -->
  <path d="M 22 10 L 48 10 L 36 28 L 50 28 L 24 60 L 32 40 L 18 40 Z"
        fill="url(#storm-mark-g)"/>
</svg>
